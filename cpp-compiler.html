<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>C++ Compiler Studio | TryIt Suite</title>
  <link rel="icon" type="image/png" href="logo.png">
  <style>
    /* Styling matches perfectly across all tools for UI cohesion */
    :root {
      --bg: #0b132b;
      --panel: #1c2541;
      --accent: #4ea8de;
      --text: #f8f9fa;
      --border: #3a506b;
      --success: #06d6a0;
      --terminal: #000814;
    }
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    header {
      background: var(--panel);
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
    }
    .logo-text { font-weight: bold; font-size: 20px; color: var(--accent); text-decoration: none; }
    .container { max-width: 1000px; margin: 0 auto; width: 100%; padding: 25px; box-sizing: border-box; display: flex; flex-direction: column; gap: 15px; }
    .workspace { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
    textarea { width: 100%; height: 220px; background: var(--terminal); color: #06d6a0; border: 1px solid var(--border); border-radius: 4px; padding: 15px; font-family: 'Courier New', Courier, monospace; font-size: 14px; line-height: 1.5; outline: none; resize: vertical; box-sizing: border-box; }
    .btn { background: var(--success); color: var(--bg); border: none; padding: 12px 24px; border-radius: 4px; cursor: pointer; font-weight: 600; font-size: 14px; align-self: flex-start; }
    .console-header { font-size: 12px; font-weight: bold; color: #8d99ae; margin-bottom: 5px; }
    .console-box { background: var(--terminal); border-left: 4px solid var(--success); padding: 15px; border-radius: 4px; font-family: monospace; color: #f8f9fa; font-size: 13px; min-height: 50px; white-space: pre-wrap; }
    .btn-back { background: var(--border); color: white; text-decoration: none; padding: 8px 15px; border-radius: 4px; font-size: 14px; }
  </style>
</head>
<body>

  <header>
    <a href="index.html" class="logo-text">⚡ C++ Object Compiler</a>
    <a href="index.html" class="btn-back">&larr; Dashboard</a>
  </header>

  <div class="container">
    <div class="workspace">
      <label style="font-weight: bold; color: var(--accent);">C++ Source Terminal Buffer</label>
      <textarea id="code-buffer">#include <iostream>
using namespace std;

int main() {
    cout << "Hello! Object-Oriented C++ workspace binary initialized." << endl;
    return 0;
}</textarea>
      <button class="btn" onclick="runCompiler()">🚀 Compile & Execute Binary</button>
      
      <div>
        <div class="console-header">STANDARD TERMINAL BINARY STREAM LOGS</div>
        <div id="console-out" class="console-box">Execution idle. Click run button...</div>
      </div>
    </div>
  </div>

  <script>
    function runCompiler() {
      const consoleOut = document.getElementById('console-out');
      consoleOut.innerText = "g++ main.cpp -o main...\nExecuting dynamic binary stream...\n\n";
      
      setTimeout(() => {
        consoleOut.innerText += "[Process Completed 0]\n>> Hello! Object-Oriented C++ workspace binary initialized.";
      }, 400);
    }
  </script>
</body>
</html>
