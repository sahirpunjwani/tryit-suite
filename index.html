<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TryIt Suite - Home</title>
  <link rel="stylesheet" href="sidebar.css">
  <link rel="icon" type="image/png" href="tryit-playground/logo.png">
  
  <style>
    /* HERO LANDING PAGE STYLES */
    .hero-section {
      position: relative;
      width: 100%;
      height: 100vh;
      /* Replace 'your-background-file.jpg' with your actual background image name */
      background: linear-gradient(rgba(11, 19, 43, 0.7), rgba(11, 19, 43, 0.8)), url('tryit-playground/bg.png') no-repeat center center/cover;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: #f8f9fa;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      padding: 20px;
      box-sizing: border-box;
    }

    /* Floating Menu Button for Homepage */
    .home-menu-trigger {
      position: absolute;
      top: 20px;
      left: 20px;
      background: #4ea8de;
      color: #0b132b;
      border: none;
      padding: 10px 18px;
      border-radius: 4px;
      font-weight: bold;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.2s;
    }
    .home-menu-trigger:hover {
      background: #5fa8d3;
    }

    .logo-container {
      margin-bottom: 20px;
    }

    .logo-img {
      width: 120px; /* Adjust size to fit your logo asset */
      height: auto;
      object-fit: contain;
      filter: drop-shadow(0px 4px 8px rgba(0, 0, 0, 0.5));
    }

    .brand-name {
      font-size: 3.5rem;
      margin: 0 0 10px 0;
      font-weight: 800;
      letter-spacing: 1px;
    }
    .brand-name span {
      color: #4ea8de;
    }

    .brand-tagline {
      font-size: 1.2rem;
      color: #8d99ae;
      margin: 0 0 35px 0;
      max-width: 500px;
    }

    /* Get Started CTA Button */
    .btn-get-started {
      display: inline-block;
      background: #4ea8de;
      color: #0b132b;
      text-decoration: none;
      padding: 15px 40px;
      font-size: 1.1rem;
      font-weight: bold;
      border-radius: 50px;
      box-shadow: 0 4px 15px rgba(78, 168, 222, 0.4);
      transition: transform 0.2s, box-shadow 0.2s, background-color 0.2s;
    }

    .btn-get-started:hover {
      background: #5fa8d3;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(78, 168, 222, 0.6);
    }
    
    .btn-get-started:active {
      transform: translateY(1px);
    }
  </style>
</head>
<body>

  <div class="main-content">
    <section class="hero-section">


      <div class="logo-container">
        <img src="tryit-playground/logo.png" alt="TryIt Suite Logo" class="logo-img">
      </div>

      <h1 class="brand-name">TryIt <span>Suite</span></h1>
      <p class="brand-tagline">Your all-in-one sandbox terminal for compilers, security tools, and data generation handlers.</p>

      <a href="dashboard.html" class="btn-get-started"; return false;">Get Started →</a>

    </section>
  </div>

  <script>
    function toggleSidebar() {
      const sidebar = document.getElementById('layout-sidebar');
      const mainContent = document.querySelector('.main-content');
      sidebar.classList.toggle('open');
      if (mainContent) {
        mainContent.classList.toggle('shifted');
      }
    }
  </script>

</body>
</html>
