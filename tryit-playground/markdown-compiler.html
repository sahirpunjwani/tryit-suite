<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="logo.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markdown Live Compiler | TryIt Tools</title>
  <style>
    :root {
      --bg: #0b132b;
      --panel: #1c2541;
      --accent: #4ea8de;
      --text: #f8f9fa;
      --border: #3a506b;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      background: var(--panel);
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-weight: bold;
      font-size: 20px;
      color: var(--accent);
      text-decoration: none;
    }

    .container {
      display: flex;
      flex: 1;
      padding: 20px;
      gap: 20px;
      box-sizing: border-box;
      overflow: hidden;
    }

    .pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--panel);
      border-radius: 8px;
      border: 1px solid var(--border);
      padding: 20px;
      gap: 15px;
    }

    .pane-header {
      font-weight: 600;
      font-size: 18px;
      color: var(--accent);
      border-bottom: 1px solid var(--border);
      padding-bottom: 10px;
    }

    textarea {
      flex: 1;
      background: #000814;
      color: #f8f9fa;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 12px;
      font-family: monospace;
      font-size: 14px;
      resize: none;
      outline: none;
    }

    .viewer {
      flex: 1;
      background: #ffffff;
      color: #333333;
      border-radius: 4px;
      padding: 20px;
      overflow-y: auto;
    }
    .viewer h1 { margin-top: 0; color: #111; border-bottom: 1px solid #ddd; padding-bottom: 5px;}
    .viewer h2 { color: #444; }

    .btn {
      background: var(--border);
      color: var(--text);
      border: none;
      padding: 8px 15px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      text-decoration: none;
    }
    .btn:hover { background: var(--accent); color: var(--bg); }
    @media (max-width: 768px) { .container { flex-direction: column; } }
  </style>
</head>
<body>

  <header>
    <a href="index.html" class="logo">⚡ TryIt Markdown Studio</a>
    <a href="index.html" class="btn">&larr; Back to Dashboard</a>
  </header>

  <div class="container">
    <div class="pane">
      <div class="pane-header">Markdown Raw Text Editor</div>
      <textarea id="md-input" oninput="compileMarkdown()"># Project Launch 🚀\n## Subheading Section\nThis is standard text content with **bold emphasis words** configured directly.</textarea>
    </div>

    <div class="pane">
      <div class="pane-header">Live Render Layout Output</div>
      <div id="md-render-zone" class="viewer"></div>
    </div>
  </div>

  <script>
    function compileMarkdown() {
      const input = document.getElementById('md-input').value;
      const zone = document.getElementById('md-render-zone');

      // Basic regex compiler script parsing strings line-by-line
      let html = input
        .replace(/^#\s(.*)$/mg, '<h1>$1</h1>')
        .replace(/^##\s(.*)$/mg, '<h2>$1</h2>')
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');

      // Wrap line breaks that aren't wrapped by heading tokens inside basic paragraph breaks
      html = html.split('\n').map(line => {
        if (!line.startsWith('<h1') && !line.startsWith('<h2') && line.trim() !== '') {
          return `<p>${line}</p>`;
        }
        return line;
      }).join('\n');

      zone.innerHTML = html;
    }
    compileMarkdown();
  </script>
</body>
</html>
